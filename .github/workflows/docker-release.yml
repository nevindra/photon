name: Release Docker image

# On a semver release tag (e.g. v1.1.0), build the self-contained Dockerfile
# and push the image to GHCR tagged with the exact version (1.1.0). Tests run
# separately on push/PR (ci.yml); tag from an already-green commit on main.

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push to GHCR with the built-in GITHUB_TOKEN

jobs:
  build-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Turns git tag v1.1.0 into the Docker tag 1.1.0 (no `latest`, no floating tags).
      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # keep the GHCR package listing single-arch/clean
          cache-from: type=gha
          cache-to: type=gha,mode=max
